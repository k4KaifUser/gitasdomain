<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hey Juvy Jii 🌙</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --night: #07091a;
      --deep: #0d1030;
      --glow: #c8a8f9;
      --soft: #f5d0fe;
      --blush: #fda4af;
      --star: #fffbe8;
      --text: #e8d5ff;
    }

    body {
      background: radial-gradient(ellipse at 20% 30%, #0e0828 0%, #07091a 50%, #020510 100%);
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Nebula clouds */
    .nebula {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .nebula::before {
      content: '';
      position: absolute;
      top: 5%; left: 10%;
      width: 45vw; height: 35vh;
      background: radial-gradient(ellipse, rgba(120,60,200,0.07) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(30px);
    }
    .nebula::after {
      content: '';
      position: absolute;
      bottom: 10%; right: 5%;
      width: 40vw; height: 30vh;
      background: radial-gradient(ellipse, rgba(60,100,220,0.06) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(40px);
    }

    /* Stars layer */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      background: var(--star);
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }

    /* Big glowing stars */
    .star.big {
      box-shadow: 0 0 4px 2px rgba(255,251,232,0.6);
    }

    /* Colored stars */
    .star.blue  { background: #a8d8ff; box-shadow: 0 0 3px 1px rgba(168,216,255,0.5); }
    .star.pink  { background: #ffb8d4; box-shadow: 0 0 3px 1px rgba(255,184,212,0.5); }
    .star.gold  { background: #ffd97d; box-shadow: 0 0 4px 2px rgba(255,217,125,0.6); }

    @keyframes twinkle {
      from { opacity: 0.08; transform: scale(0.7); }
      to   { opacity: 1;    transform: scale(1.3); }
    }

    /* Multiple shooting stars */
    .shoot {
      position: fixed;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      z-index: 1;
      opacity: 0;
    }
    .shoot:nth-child(1) {
      top: 8%; left: -5%; width: 160px;
      animation: shoot1 6s linear infinite;
    }
    .shoot:nth-child(2) {
      top: 20%; left: -5%; width: 120px;
      animation: shoot1 9s 3s linear infinite;
    }
    .shoot:nth-child(3) {
      top: 5%; left: -5%; width: 200px;
      animation: shoot1 7s 5s linear infinite;
    }

    @keyframes shoot1 {
      0%   { transform: translate(0,0) rotate(22deg); opacity:0; }
      8%   { opacity: 1; }
      55%  { opacity: 0; }
      100% { transform: translate(130vw, 45vh) rotate(22deg); opacity:0; }
    }

    /* Milky way stripe */
    .milky {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(115deg,
        transparent 20%,
        rgba(180,160,255,0.025) 35%,
        rgba(200,180,255,0.04) 45%,
        rgba(180,160,255,0.025) 55%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Moon */
    .moon {
      position: fixed;
      top: 36px;
      right: 60px;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #fffce8, #f5d060);
      box-shadow:
        0 0 30px 10px rgba(245,208,96,0.35),
        0 0 80px 30px rgba(245,208,96,0.12),
        0 0 120px 50px rgba(245,208,96,0.06);
      animation: moonGlow 4s ease-in-out infinite alternate;
      z-index: 2;
    }
    @keyframes moonGlow {
      from { box-shadow: 0 0 30px 10px rgba(245,208,96,0.35), 0 0 80px 30px rgba(245,208,96,0.12), 0 0 120px 50px rgba(245,208,96,0.06); }
      to   { box-shadow: 0 0 55px 20px rgba(245,208,96,0.55), 0 0 110px 40px rgba(245,208,96,0.2),  0 0 160px 60px rgba(245,208,96,0.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 20;
      background: linear-gradient(145deg, rgba(20,15,50,0.95), rgba(13,16,48,0.97));
      border: 1px solid rgba(200, 168, 249, 0.2);
      border-radius: 28px;
      padding: 44px 40px 40px;
      max-width: 420px;
      width: 92%;
      box-shadow: 0 0 60px rgba(200,168,249,0.1), 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeUp 1s ease forwards;
      opacity: 0;
      transform: translateY(30px);
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .emoji-top {
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.4rem;
      text-align: center;
      color: var(--soft);
      text-shadow: 0 0 20px rgba(200,168,249,0.6);
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(200,168,249,0.55);
      letter-spacing: 0.05em;
      margin-bottom: 28px;
    }

    .question {
      font-size: 0.98rem;
      color: var(--text);
      text-align: center;
      margin-bottom: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      background: rgba(200, 168, 249, 0.06);
      border: 1px solid rgba(200, 168, 249, 0.18);
      border-radius: 14px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option:hover {
      background: rgba(200, 168, 249, 0.15);
      border-color: rgba(200, 168, 249, 0.5);
      transform: translateX(4px);
      color: var(--soft);
    }

    .option.selected {
      background: linear-gradient(135deg, rgba(200,168,249,0.2), rgba(253,164,175,0.1));
      border-color: var(--glow);
      color: #fff;
    }

    .opt-icon { font-size: 1.2rem; }

    /* Reply */
    .reply {
      display: none;
      margin-top: 24px;
      text-align: center;
      animation: fadeUp 0.6s ease forwards;
    }

    .reply.show { display: block; }

    .reply-text {
      font-family: 'Dancing Script', cursive;
      font-size: 1.45rem;
      color: var(--blush);
      text-shadow: 0 0 14px rgba(253,164,175,0.5);
      line-height: 1.5;
    }

    .reply-sub {
      margin-top: 6px;
      font-size: 0.8rem;
      color: rgba(200,168,249,0.45);
    }

    .sparkle {
      font-size: 1.4rem;
      animation: pulse 1.5s ease infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <div class="nebula"></div>
  <div class="milky"></div>
  <div class="stars" id="stars"></div>
  <div class="shoot"></div>
  <div class="shoot"></div>
  <div class="shoot"></div>
  <div class="moon"></div>

  <div class="card">
    <div class="emoji-top">🌙✨</div>
    <h1>Hey Juvy Jii</h1>
    <p class="subtitle">a tiny question, just for you ~</p>

    <p class="question">How would you like to be impressed? 💫</p>

    <div class="options" id="options">
      <button class="option" onclick="pick(this, '💌 Aww, a sweet handwritten note goes straight to my heart!')">
        <span class="opt-icon">💌</span> A sweet little note
      </button>
      <button class="option" onclick="pick(this, '🌸 Yes please! Little surprises make everything better~')">
        <span class="opt-icon">🌸</span> Surprise me with something small
      </button>
      <button class="option" onclick="pick(this, '🌙 Aww stargazing together sounds magical...')">
        <span class="opt-icon">🌙</span> Stargazing & deep talks
      </button>
      <button class="option" onclick="pick(this, '🎤 Omg singing just for me?? That would be so sweet!')">
        <span class="opt-icon">🎤</span> Sing for me
      </button>
      <button class="option" onclick="pick(this, '😂 YES! Laughing together is the best feeling ever~')">
        <span class="opt-icon">😂</span> Make me laugh, always
      </button>
    </div>

    <div class="reply" id="reply">
      <div class="sparkle">🌟</div>
      <p class="reply-text" id="reply-text"></p>
      <p class="reply-sub">noted, Juvy Jii 🌙</p>
    </div>
  </div>

  <script>
    const container = document.getElementById('stars');

    const types = ['', '', '', '', 'big', 'blue', 'pink', 'gold'];

    for (let i = 0; i < 380; i++) {
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random();
      const isBig = size > 0.88;
      const r = isBig ? (Math.random() * 2 + 1.5) : (Math.random() * 1.2 + 0.3);
      const type = types[Math.floor(Math.random() * types.length)];

      const star = document.createElement('div');
      star.classList.add('star');
      if (type) star.classList.add(type);
      star.style.cssText = `
        left:${x}%; top:${y}%;
        width:${r*2}px; height:${r*2}px;
        --dur:${(Math.random()*3+1).toFixed(1)}s;
        animation-delay:${(Math.random()*5).toFixed(1)}s;
      `;
      container.appendChild(star);
    }

    // pick option
    function pick(btn, msg) {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      btn.classList.add('selected');
      const reply = document.getElementById('reply');
      document.getElementById('reply-text').textContent = msg;
      reply.classList.add('show');
      reply.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
